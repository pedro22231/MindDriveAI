<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a0f">
  <title>Nexo - IA Inteligente</title>
  <meta name="description" content="Nexo e uma IA leve e inteligente para criar, descobrir e resolver.">
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <svg width="32" height="32" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="24" cy="24" r="20" stroke="url(#logoGradient)" stroke-width="2.5" fill="none"/>
            <circle cx="14" cy="18" r="3" fill="url(#logoGradient)"/>
            <circle cx="34" cy="18" r="3" fill="url(#logoGradient)"/>
            <circle cx="24" cy="34" r="3" fill="url(#logoGradient)"/>
            <line x1="14" y1="18" x2="34" y2="18" stroke="url(#logoGradient)" stroke-width="2" stroke-linecap="round"/>
            <line x1="14" y1="18" x2="24" y2="34" stroke="url(#logoGradient)" stroke-width="2" stroke-linecap="round"/>
            <line x1="34" y1="18" x2="24" y2="34" stroke="url(#logoGradient)" stroke-width="2" stroke-linecap="round"/>
            <circle cx="24" cy="24" r="4" fill="url(#logoGradient)" opacity="0.6"/>
            <defs>
              <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#2dd4bf"/>
                <stop offset="100%" stop-color="#14b8a6"/>
              </linearGradient>
            </defs>
          </svg>
          <span class="logo-text">Nexo</span>
        </div>
        <button class="sidebar-close" id="sidebarClose">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <div class="sidebar-content">
        <button class="new-chat-btn" id="newChatBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 5v14M5 12h14"/>
          </svg>
          Nova conversa
        </button>

        <div class="conversations-section">
          <p class="section-title">Conversas recentes</p>
          <p class="empty-state">Nenhuma conversa ainda</p>
        </div>
      </div>

      <div class="sidebar-footer">
        <p>Desenvolvido por Pedro Rodrigues Cruz</p>
      </div>
    </aside>

    <!-- Mobile menu button -->
    <button class="menu-btn" id="menuBtn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 12h18M3 6h18M3 18h18"/>
      </svg>
    </button>

    <!-- Main content -->
    <main class="main">
      <!-- Welcome screen -->
      <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-content">
          <div class="welcome-logo">
            <svg width="64" height="64" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="24" cy="24" r="20" stroke="url(#welcomeGradient)" stroke-width="2.5" fill="none"/>
              <circle cx="14" cy="18" r="3" fill="url(#welcomeGradient)"/>
              <circle cx="34" cy="18" r="3" fill="url(#welcomeGradient)"/>
              <circle cx="24" cy="34" r="3" fill="url(#welcomeGradient)"/>
              <line x1="14" y1="18" x2="34" y2="18" stroke="url(#welcomeGradient)" stroke-width="2" stroke-linecap="round"/>
              <line x1="14" y1="18" x2="24" y2="34" stroke="url(#welcomeGradient)" stroke-width="2" stroke-linecap="round"/>
              <line x1="34" y1="18" x2="24" y2="34" stroke="url(#welcomeGradient)" stroke-width="2" stroke-linecap="round"/>
              <circle cx="24" cy="24" r="4" fill="url(#welcomeGradient)" opacity="0.6"/>
              <defs>
                <linearGradient id="welcomeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#2dd4bf"/>
                  <stop offset="100%" stop-color="#14b8a6"/>
                </linearGradient>
              </defs>
            </svg>
          </div>
          <h1 class="welcome-title">Ola, eu sou o Nexo</h1>
          <p class="welcome-subtitle">Uma IA leve e inteligente para criar, descobrir e resolver.</p>
          
          <div class="suggestions">
            <button class="suggestion-btn" data-suggestion="Me ajude a escrever um email profissional">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 20h9M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
              </svg>
              Me ajude a escrever um email profissional
            </button>
            <button class="suggestion-btn" data-suggestion="Explique como funciona a inteligencia artificial">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3M12 17h.01"/>
              </svg>
              Explique como funciona a inteligencia artificial
            </button>
            <button class="suggestion-btn" data-suggestion="Crie uma lista de tarefas para o meu dia">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 11l3 3L22 4M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
              </svg>
              Crie uma lista de tarefas para o meu dia
            </button>
            <button class="suggestion-btn" data-suggestion="Me de dicas para aprender programacao">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="16 18 22 12 16 6"/>
                <polyline points="8 6 2 12 8 18"/>
              </svg>
              Me de dicas para aprender programacao
            </button>
          </div>
        </div>
      </div>

      <!-- Chat area -->
      <div class="chat-area" id="chatArea">
        <div class="messages" id="messages"></div>
      </div>

      <!-- Chat input -->
      <div class="chat-input-container">
        <div class="chat-input-wrapper">
          <textarea 
            id="messageInput" 
            placeholder="Escreva sua mensagem..." 
            rows="1"
          ></textarea>
          <button class="send-btn" id="sendBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
            </svg>
          </button>
        </div>
        <p class="disclaimer">Nexo pode cometer erros. Verifique informacoes importantes.</p>
      </div>
    </main>
  </div>

  <!-- Overlay for mobile sidebar -->
  <div class="overlay" id="overlay"></div>

  <script src="script.js"></script>
</body>
</html>
